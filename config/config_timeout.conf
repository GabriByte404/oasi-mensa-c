# --- CONFIGURAZIONE TIMEOUT ---
# Obiettivo: La simulazione deve terminare per raggiungimento della durata massima (Timeout),
# non per Overload. Il sistema deve smaltire le code efficientemente.

# --- PARAMETRI GENERALI ---
# Durata della simulazione in giorni
SIM_DURATION=10

# Soglia di utenti in coda che farebbe scattare l'overload (Teniamola standard/alta)
OVERLOAD_THRESHOLD=20

# Velocità simulazione: 10ms reali = 1 minuto simulato (Veloce ma leggibile)
N_NANO_SECS=10000000

# --- POPOLAZIONE ---
# Numero moderato di utenti per garantire fluidità
NOF_USERS=40
MAX_USERS_PER_GROUP=4
# Numero sufficiente di operatori per coprire tutte le stazioni e turni
NOF_WORKERS=8

# --- RISORSE FISICHE ---
# Abbondanza di posti per evitare code all'ingresso dei tavoli
NOF_TABLE_SEATS=15

# Posti operatori (Permettono a 2 persone di lavorare insieme per smaltire la fila)
NOF_WK_SEATS_PRIMI=2
NOF_WK_SEATS_SECONDI=2
NOF_WK_SEATS_COFFEE=2
NOF_WK_SEATS_CASSA=2

# --- TEMPI DI SERVIZIO (AVG_SRVC) [Secondi simulati] ---
# Tempi bassi = Servizio veloce = Niente code
AVG_SRVC_PRIMI=8
AVG_SRVC_SECONDI=10
AVG_SRVC_COFFEE=4
AVG_SRVC_CASSA=6

# --- PREZZI (PRICE) [Euro] ---
PRICE_PRIMI=5
PRICE_SECONDI=8
PRICE_COFFEE=1

# --- PARAMETRI CUCINA (REFILL) ---
# Ricarica quando scende sotto 10 (agisce d'anticipo)
REFILL_THRESHOLD=6
# Cucina molto cibo alla volta
REFILL_AMOUNT=30
# Ci mette poco a cucinare (10 minuti simulati)
AVG_REFILL_TIME=10
# Massimo 2 pause per non lasciare sguarnite le stazioni troppo spesso
NOF_PAUSES=2

# --- STATO INIZIALE E CAPACITÀ ---
# Partiamo con pentole piene
AVG_REFILL_PRIMI=30
AVG_REFILL_SECONDI=30
# Capacità massima delle pentole
MAX_PORZIONI_PRIMI=30
MAX_PORZIONI_SECONDI=30