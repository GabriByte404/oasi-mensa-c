# Configurazione TIMEOUT - OVERLOAD GARANTITO

# --- PARAMETRI GENERALI ---
SIM_DURATION=5
OVERLOAD_THRESHOLD=5
# RALLENTIAMO IL TEMPO: 100ms reali = 1 minuto simulato
N_NANO_SECS=10000000

# --- POPOLAZIONE (Tanta gente) ---
NOF_USERS=60
MAX_USERS_PER_GROUP=10
NOF_WORKERS=5

# --- RISORSE (Collo di bottiglia stretto) ---
NOF_TABLE_SEATS=10
NOF_WK_SEATS_PRIMI=1
NOF_WK_SEATS_SECONDI=1
NOF_WK_SEATS_COFFEE=1
NOF_WK_SEATS_CASSA=1

# --- TEMPI DI SERVIZIO (Bradipi allo sportello) ---
# 1000 secondi simulati = ~16 minuti a persona
AVG_SRVC_PRIMI=1000
AVG_SRVC_SECONDI=1000
AVG_SRVC_COFFEE=1000
AVG_SRVC_CASSA=1000

# --- PREZZI ---
PRICE_PRIMI=5
PRICE_SECONDI=8
PRICE_COFFEE=1

# --- REFILL ---
REFILL_THRESHOLD=5
REFILL_AMOUNT=20
AVG_REFILL_TIME=100
NOF_PAUSES=2

AVG_REFILL_PRIMI=20
AVG_REFILL_SECONDI=20
MAX_PORZIONI_PRIMI=20
MAX_PORZIONI_SECONDI=20